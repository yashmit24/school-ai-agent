<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Parent Portal — School Mitra</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{--primary:#6c63ff;--secondary:#48cfad;--accent:#f7c948;--bg:#0d0d1a;--card:rgba(255,255,255,0.04);--border:rgba(108,99,255,0.2);--text:#e0e0f0;--muted:#9d95ff}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;overflow:hidden}
    .orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:0.15;pointer-events:none}
    .o1{width:400px;height:400px;background:var(--primary);top:-80px;left:-80px;animation:fl 14s ease-in-out infinite}
    .o2{width:350px;height:350px;background:var(--secondary);bottom:-60px;right:-60px;animation:fl 14s ease-in-out infinite reverse}
    @keyframes fl{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}
    .wrap{position:relative;z-index:1;width:100%;max-width:420px}
    .card{background:rgba(13,13,26,0.9);border:1px solid var(--border);border-radius:24px;padding:36px 32px;box-shadow:0 30px 80px rgba(0,0,0,0.4);backdrop-filter:blur(20px)}
    .top{text-align:center;margin-bottom:32px}
    .logo{width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:2.4rem;margin:0 auto 16px;box-shadow:0 8px 30px rgba(108,99,255,0.4)}
    .brand{font-size:1.5rem;font-weight:800;margin-bottom:4px}
    .sub{font-size:0.85rem;color:var(--muted)}
    .badge{display:inline-block;background:rgba(72,207,173,0.15);color:#48cfad;border:1px solid rgba(72,207,173,0.3);border-radius:20px;font-size:0.72rem;font-weight:600;padding:3px 12px;margin-top:8px;letter-spacing:0.5px}
    .label{font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block}
    .inp{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1.5px solid var(--border);border-radius:13px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;margin-bottom:16px}
    .inp:focus{border-color:var(--primary)}
    .inp::placeholder{color:#4a4570}
    .inp[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    .field{margin-bottom:4px}
    .hint{font-size:0.72rem;color:#5a5580;margin-bottom:16px}
    .btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:13px;color:#fff;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:transform 0.15s,opacity 0.2s;margin-top:4px}
    .btn:hover{opacity:0.9;transform:translateY(-1px)}
    .btn:active{transform:scale(0.98)}
    .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .alert{border-radius:11px;padding:12px 15px;font-size:0.85rem;font-weight:500;margin-bottom:16px;display:none}
    .err{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);color:#e74c3c;display:block}
    .ok{background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.3);color:#2ecc71;display:block}
    .info-row{display:flex;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid rgba(108,99,255,0.1)}
    .info-box{flex:1;text-align:center;background:rgba(108,99,255,0.06);border:1px solid rgba(108,99,255,0.12);border-radius:12px;padding:12px 8px}
    .info-icon{font-size:1.4rem;margin-bottom:4px}
    .info-text{font-size:0.7rem;color:var(--muted);line-height:1.4}
    @media(max-width:420px){.card{padding:28px 20px}}
  </style>
</head>
<body>
  <div class="orb o1"></div>
  <div class="orb o2"></div>

  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="logo" id="portalLogo">🏫</div>
        <div class="brand" id="portalSchoolName">School Mitra</div>
        <div class="sub">Parent Portal</div>
        <div class="badge">👨‍👩‍👧 Secure Parent Login</div>
      </div>

      <div class="alert" id="alertBox"></div>

      <form id="loginForm">
        <div class="field">
          <label class="label">Child's Roll Number</label>
          <input class="inp" id="rollNo" type="number" placeholder="e.g. 12" required/>
          <div class="hint">Roll number jo report card mein likha ho</div>
        </div>
        <div class="field">
          <label class="label">Registered Phone Number</label>
          <input class="inp" id="phone" type="tel" placeholder="e.g. 9876543210" required/>
          <div class="hint">Wahi number jo school mein registered hai</div>
        </div>
        <button class="btn" type="submit" id="loginBtn">🔐 Access Portal</button>
      </form>

      <div class="info-row">
        <div class="info-box"><div class="info-icon">📊</div><div class="info-text">Attendance & Fees</div></div>
        <div class="info-box"><div class="info-icon">📚</div><div class="info-text">Homework</div></div>
        <div class="info-box"><div class="info-icon">📢</div><div class="info-text">Notices & Exams</div></div>
      </div>
    </div>
  </div>

  <script>
    var API = 'https://school-ai-agent-eynr.onrender.com';

    // Redirect if already logged in
    var tok = localStorage.getItem('parentToken') || sessionStorage.getItem('parentToken');
    if (tok) window.location.href = 'parent-portal.html';

    // Load branding
    fetch(API + '/api/branding').then(function(r){return r.json();}).then(function(j){
      if (j.success && j.data) {
        var b = j.data;
        if (b.school_name) document.getElementById('portalSchoolName').textContent = b.school_name;
        if (b.logo_url) document.getElementById('portalLogo').innerHTML = '<img src="'+b.logo_url+'" style="width:52px;height:52px;object-fit:contain;border-radius:12px"/>';
        if (b.primary_color) document.documentElement.style.setProperty('--primary', b.primary_color);
        if (b.secondary_color) document.documentElement.style.setProperty('--secondary', b.secondary_color);
      }
    }).catch(function(){});

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Verifying...';
      var alertBox = document.getElementById('alertBox');
      alertBox.className = 'alert';

      try {
        var res = await fetch(API + '/api/parent/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            roll_no: document.getElementById('rollNo').value.trim(),
            phone: document.getElementById('phone').value.trim()
          })
        });
        var json = await res.json();

        if (json.success) {
          localStorage.setItem('parentToken', json.token);
          localStorage.setItem('parentStudent', JSON.stringify(json.student));
          alertBox.className = 'alert ok';
          alertBox.textContent = '✅ Welcome, ' + json.student.parent_name + '! Loading portal...';
          setTimeout(function(){ window.location.href = 'parent-portal.html'; }, 800);
        } else {
          alertBox.className = 'alert err';
          alertBox.textContent = '❌ ' + json.error;
          btn.disabled = false;
          btn.textContent = '🔐 Access Portal';
        }
      } catch(err) {
        alertBox.className = 'alert err';
        alertBox.textContent = '❌ Network error. Please try again.';
        btn.disabled = false;
        btn.textContent = '🔐 Access Portal';
      }
    });
  </script>
</body>
</html>
