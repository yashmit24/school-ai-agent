<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — School Mitra</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0d0d1a;color:#e0e0f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(108,99,255,0.25);border-radius:24px;padding:40px;max-width:420px;width:90%}
    h2{font-size:1.4rem;font-weight:800;margin-bottom:6px}
    .sub{color:#9d95ff;font-size:0.85rem;margin-bottom:28px}
    label{display:block;font-size:0.78rem;font-weight:600;color:#9d95ff;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px}
    .field{margin-bottom:18px}
    input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(108,99,255,0.25);border-radius:12px;color:#e0e0f0;font-family:'Inter',sans-serif;font-size:0.9rem;outline:none}
    input:focus{border-color:#6c63ff}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:46px}
    .pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9d95ff;font-size:1rem}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,#6c63ff,#48cfad);border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .alert{border-radius:10px;padding:12px 16px;font-size:0.85rem;font-weight:500;margin-bottom:16px;display:none}
    .alert.error{background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.3);color:#e74c3c;display:block}
    .alert.success{background:rgba(46,204,113,0.12);border:1px solid rgba(46,204,113,0.3);color:#2ecc71;display:block}
    a{color:#6c63ff;text-decoration:none;font-size:0.85rem}
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Reset Password</h2>
    <div class="sub">Enter your new password below.</div>
    <div class="alert" id="alertBox"></div>
    <form id="resetForm">
      <div class="field">
        <label>New Password (min 8 chars)</label>
        <div class="pw-wrap">
          <input type="password" id="newPass" placeholder="Enter new password" required minlength="8"/>
          <button type="button" class="pw-toggle" onclick="const i=document.getElementById('newPass');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁️':'🙈'">👁️</button>
        </div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirmPass" placeholder="Repeat password" required/>
      </div>
      <button type="submit" class="btn" id="resetBtn">🔐 Reset Password</button>
    </form>
    <div style="text-align:center;margin-top:18px"><a href="login.html">← Back to Login</a></div>
  </div>

  <script>
    const API = 'https://school-ai-agent-eynr.onrender.com';
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('alertBox').className = 'alert error';
      document.getElementById('alertBox').textContent = '❌ Invalid reset link. Please request a new one.';
      document.getElementById('resetForm').style.display = 'none';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pass = document.getElementById('newPass').value;
      const confirm = document.getElementById('confirmPass').value;
      const alert = document.getElementById('alertBox');
      const btn = document.getElementById('resetBtn');

      if (pass !== confirm) {
        alert.className = 'alert error';
        alert.textContent = '❌ Passwords do not match';
        return;
      }

      btn.disabled = true; btn.textContent = '⏳ Resetting...';

      try {
        const res = await fetch(`${API}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pass })
        });
        const json = await res.json();
        if (json.success) {
          alert.className = 'alert success';
          alert.textContent = '✅ Password reset! Redirecting to login...';
          document.getElementById('resetForm').style.display = 'none';
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          alert.className = 'alert error';
          alert.textContent = '❌ ' + json.error;
          btn.disabled = false; btn.textContent = '🔐 Reset Password';
        }
      } catch(err) {
        alert.className = 'alert error';
        alert.textContent = '❌ Server error. Try again.';
        btn.disabled = false; btn.textContent = '🔐 Reset Password';
      }
    });
  </script>
</body>
</html>
