<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — School Mitra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#6c63ff;--secondary:#48cfad;--accent:#f7c948;
      --bg:#0d0d1a;--border:rgba(108,99,255,0.25);
      --text:#e0e0f0;--muted:#9d95ff;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;animation:drift 12s ease-in-out infinite}
    .orb1{width:500px;height:500px;background:var(--primary);top:-100px;left:-100px;animation-delay:0s}
    .orb2{width:400px;height:400px;background:var(--secondary);bottom:-80px;right:-80px;animation-delay:4s}
    .orb3{width:300px;height:300px;background:var(--accent);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:8s}
    @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.95)}}
    .login-wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}
    .login-card{background:rgba(13,13,26,0.9);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:44px 40px;box-shadow:0 40px 80px rgba(0,0,0,0.5)}
    .login-logo{text-align:center;margin-bottom:28px}
    .logo-ring{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 12px;box-shadow:0 8px 32px rgba(108,99,255,0.4)}
    .login-title{font-size:1.5rem;font-weight:800;margin-bottom:4px}
    .login-sub{font-size:0.85rem;color:var(--muted)}
    .auth-tabs{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
    .auth-tab{flex:1;padding:9px;text-align:center;border:none;background:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;border-radius:9px;transition:all 0.2s}
    .auth-tab.active{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff}
    .panel{display:none}
    .panel.active{display:block}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:0.75rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
    .field input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.06);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
    .field input:focus{border-color:var(--primary)}
    .field input::placeholder{color:#5a5580}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:46px}
    .pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:4px}
    .login-extras{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .remember{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--muted);cursor:pointer}
    .remember input{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
    .forgot-link{font-size:0.82rem;color:var(--primary);text-decoration:none;font-weight:500}
    .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.15s}
    .btn-submit:hover{opacity:0.9;transform:translateY(-1px)}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .alert{border-radius:10px;padding:12px 16px;font-size:0.85rem;font-weight:500;margin-bottom:14px;display:none}
    .alert.error{background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.3);color:#e74c3c;display:block}
    .alert.success{background:rgba(46,204,113,0.12);border:1px solid rgba(46,204,113,0.3);color:#2ecc71;display:block}
    .divider{text-align:center;position:relative;margin:18px 0}
    .divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
    .divider span{position:relative;background:rgba(13,13,26,0.9);padding:0 12px;color:var(--muted);font-size:0.78rem}
    .back-link{display:block;text-align:center;font-size:0.82rem;color:var(--primary);text-decoration:none;cursor:pointer}
    .setup-warning{background:rgba(247,201,72,0.08);border:1px solid rgba(247,201,72,0.3);border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:0.82rem;color:#f7c948}
    @media(max-width:480px){.login-card{padding:30px 20px}.login-wrap{padding:12px}}
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-ring" id="loginLogoRing">🏫</div>
        <div class="login-title" id="loginSchoolName">School Mitra</div>
        <div class="login-sub">Admin Dashboard</div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchPanel('login')">🔐 Login</button>
        <button class="auth-tab" id="tab-forgot" onclick="switchPanel('forgot')">🔑 Forgot Password</button>
        <button class="auth-tab" id="tab-setup" style="display:none" onclick="switchPanel('setup')">⚙️ Setup</button>
      </div>

      <div class="alert" id="alertBox"></div>

      <!-- LOGIN PANEL -->
      <div class="panel active" id="panel-login">
        <form id="loginForm">
          <div class="field">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="admin@school.com" required autocomplete="email"/>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="pw-wrap">
              <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password"/>
              <button type="button" class="pw-toggle" onclick="togglePw('loginPassword',this)">👁️</button>
            </div>
          </div>
          <div class="login-extras">
            <label class="remember">
              <input type="checkbox" id="rememberMe" checked/> Remember me
            </label>
            <a href="#" class="forgot-link" onclick="switchPanel('forgot');return false">Forgot password?</a>
          </div>
          <button type="submit" class="btn-submit" id="loginBtn">🔐 Login to Dashboard</button>
        </form>
      </div>

      <!-- FORGOT PASSWORD PANEL -->
      <div class="panel" id="panel-forgot">
        <form id="forgotForm">
          <div class="field">
            <label>Registered Email</label>
            <input type="email" id="forgotEmail" placeholder="admin@school.com" required/>
          </div>
          <button type="submit" class="btn-submit" id="forgotBtn">📱 Send Reset Link</button>
        </form>
        <div class="divider"><span>or</span></div>
        <a class="back-link" onclick="switchPanel('login');return false">← Back to Login</a>
      </div>

      <!-- SETUP PANEL -->
      <div class="panel" id="panel-setup">
        <div class="setup-warning">⚠️ First-time setup — create your admin account.</div>
        <form id="setupForm">
          <div class="field"><label>Full Name</label><input type="text" id="setupName" placeholder="Your Name" required/></div>
          <div class="field"><label>Email</label><input type="email" id="setupEmail" placeholder="admin@school.com" required/></div>
          <div class="field"><label>Phone (for WhatsApp resets)</label><input type="text" id="setupPhone" placeholder="+91 98765 43210"/></div>
          <div class="field">
            <label>Password (min 8 characters)</label>
            <div class="pw-wrap">
              <input type="password" id="setupPassword" placeholder="Create strong password" required minlength="8"/>
              <button type="button" class="pw-toggle" onclick="togglePw('setupPassword',this)">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="setupBtn">⚙️ Create Admin Account</button>
        </form>
        <div class="divider"><span>or</span></div>
        <a class="back-link" onclick="switchPanel('login');return false">← Back to Login</a>
      </div>

    </div>
  </div>

  <script>
    var API = 'https://school-ai-agent-eynr.onrender.com';

    // ── Panel switcher
    window.switchPanel = function(name) {
      ['login','forgot','setup'].forEach(function(n) {
        document.getElementById('panel-' + n).classList.remove('active');
        var t = document.getElementById('tab-' + n);
        if (t) t.classList.remove('active');
      });
      document.getElementById('panel-' + name).classList.add('active');
      var activeTab = document.getElementById('tab-' + name);
      if (activeTab) activeTab.classList.add('active');
      document.getElementById('alertBox').className = 'alert';
      document.getElementById('alertBox').innerHTML = '';
    };

    // ── Alert helpers
    function showAlert(msg, type) {
      var el = document.getElementById('alertBox');
      el.className = 'alert ' + type;
      el.innerHTML = msg;
    }

    // ── Password toggle
    window.togglePw = function(id, btn) {
      var inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    };

    // ── LOGIN FORM
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Logging in...';
      document.getElementById('alertBox').className = 'alert';

      try {
        var res = await fetch(API + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value.trim(),
            password: document.getElementById('loginPassword').value
          })
        });
        var json = await res.json();

        if (json.success) {
          var store = document.getElementById('rememberMe').checked ? localStorage : sessionStorage;
          store.setItem('adminToken', json.token);
          store.setItem('adminUser', JSON.stringify(json.admin));
          showAlert('✅ Welcome, <b>' + json.admin.name + '</b>! Redirecting...', 'success');
          btn.textContent = '✅ Done!';
          setTimeout(function() { window.location.href = 'admin.html'; }, 800);
        } else {
          showAlert('❌ ' + json.error, 'error');
          btn.disabled = false;
          btn.textContent = '🔐 Login to Dashboard';
        }
      } catch(err) {
        showAlert('❌ Network error: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = '🔐 Login to Dashboard';
      }
    });

    // ── FORGOT PASSWORD FORM
    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('forgotBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Sending...';
      try {
        var res = await fetch(API + '/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('forgotEmail').value.trim() })
        });
        var json = await res.json();
        if (json.success) {
          showAlert('📱 Reset link sent! Check your WhatsApp.', 'success');
        } else {
          showAlert('❌ ' + json.error, 'error');
        }
      } catch(err) {
        showAlert('❌ Server error. Try again.', 'error');
      }
      btn.disabled = false;
      btn.textContent = '📱 Send Reset Link';
    });

    // ── SETUP FORM
    document.getElementById('setupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('setupBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Creating...';
      try {
        var res = await fetch(API + '/api/auth/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('setupName').value.trim(),
            email: document.getElementById('setupEmail').value.trim(),
            password: document.getElementById('setupPassword').value,
            phone: document.getElementById('setupPhone').value.trim()
          })
        });
        var json = await res.json();
        if (json.success) {
          showAlert('✅ Admin created! You can now login.', 'success');
          document.getElementById('tab-setup').style.display = 'none';
          setTimeout(function() { switchPanel('login'); }, 1500);
        } else {
          showAlert('❌ ' + json.error, 'error');
        }
      } catch(err) {
        showAlert('❌ Server error. Try again.', 'error');
      }
      btn.disabled = false;
      btn.textContent = '⚙️ Create Admin Account';
    });

    // ── Load branding
    fetch(API + '/api/branding').then(function(r){ return r.json(); }).then(function(json) {
      if (json.success && json.data) {
        var b = json.data;
        if (b.school_name) document.getElementById('loginSchoolName').textContent = b.school_name;
        if (b.logo_url) document.getElementById('loginLogoRing').innerHTML = '<img src="' + b.logo_url + '" style="width:48px;height:48px;object-fit:contain;border-radius:10px"/>';
        if (b.primary_color) document.documentElement.style.setProperty('--primary', b.primary_color);
        if (b.secondary_color) document.documentElement.style.setProperty('--secondary', b.secondary_color);
      }
    }).catch(function(){});

    // ── Redirect if already logged in
    var existingToken = localStorage.getItem('adminToken') || sessionStorage.getItem('adminToken');
    if (existingToken) { window.location.href = 'admin.html'; }

    // ── Check if first-time setup needed
    fetch(API + '/api/auth/needs-setup').then(function(r){ return r.json(); }).then(function(json) {
      if (json.success && json.needsSetup) {
        document.getElementById('tab-setup').style.display = 'flex';
        switchPanel('setup');
      }
    }).catch(function(){});
  </script>
</body>
</html>
