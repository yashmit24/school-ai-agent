<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — School Mitra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#6c63ff;--secondary:#48cfad;--accent:#f7c948;
      --bg:#0d0d1a;--surface:rgba(255,255,255,0.05);--border:rgba(108,99,255,0.25);
      --text:#e0e0f0;--muted:#9d95ff;--error:#e74c3c;--success:#2ecc71;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}

    /* Animated background */
    .bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;animation:drift 12s ease-in-out infinite}
    .orb1{width:500px;height:500px;background:var(--primary);top:-100px;left:-100px;animation-delay:0s}
    .orb2{width:400px;height:400px;background:var(--secondary);bottom:-80px;right:-80px;animation-delay:4s}
    .orb3{width:300px;height:300px;background:var(--accent);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:8s}
    @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.95)}}

    /* Card */
    .login-wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}
    .login-card{background:rgba(13,13,26,0.85);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:44px 40px;box-shadow:0 40px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(108,99,255,0.1)}

    /* Logo */
    .login-logo{text-align:center;margin-bottom:32px}
    .logo-ring{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 14px;box-shadow:0 8px 32px rgba(108,99,255,0.4)}
    .login-title{font-size:1.5rem;font-weight:800;margin-bottom:4px}
    .login-sub{font-size:0.85rem;color:var(--muted)}

    /* Tabs — Login / Setup */
    .auth-tabs{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px}
    .auth-tab{flex:1;padding:9px;text-align:center;border:none;background:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;border-radius:9px;transition:all 0.2s}
    .auth-tab.active{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;box-shadow:0 2px 12px rgba(108,99,255,0.4)}

    /* Inputs */
    .field{margin-bottom:18px}
    .field label{display:block;font-size:0.78rem;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px}
    .field input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.06);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
    .field input:focus{border-color:var(--primary)}
    .field input::placeholder{color:#5a5580}

    /* Password toggle */
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:46px}
    .pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:4px}
    .pw-toggle:hover{color:var(--text)}

    /* Remember + Forgot */
    .login-extras{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
    .remember{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--muted);cursor:pointer}
    .remember input{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
    .forgot-link{font-size:0.82rem;color:var(--primary);text-decoration:none;font-weight:500;transition:opacity 0.2s}
    .forgot-link:hover{opacity:0.8}

    /* Submit btn */
    .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.15s;position:relative;overflow:hidden}
    .btn-submit:hover{opacity:0.9;transform:translateY(-1px)}
    .btn-submit:active{transform:translateY(0)}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none}

    /* Alert messages */
    .alert{border-radius:10px;padding:12px 16px;font-size:0.85rem;font-weight:500;margin-bottom:16px;display:none;animation:fadeIn 0.3s ease}
    .alert.error{background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.3);color:#e74c3c}
    .alert.success{background:rgba(46,204,113,0.12);border:1px solid rgba(46,204,113,0.3);color:#2ecc71}
    .alert.info{background:rgba(108,99,255,0.12);border:1px solid rgba(108,99,255,0.3);color:#9d95ff}
    .alert.show{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

    /* Panel views */
    .panel{display:none}.panel.active{display:block}

    /* Divider */
    .divider{text-align:center;position:relative;margin:20px 0}
    .divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
    .divider span{position:relative;background:rgba(13,13,26,0.85);padding:0 12px;color:var(--muted);font-size:0.78rem}

    /* Reset token display */
    .reset-link-box{background:rgba(108,99,255,0.08);border:1px dashed var(--border);border-radius:10px;padding:12px;margin-top:12px;font-size:0.75rem;color:var(--muted);word-break:break-all;display:none}

    @media(max-width:480px){.login-card{padding:32px 24px}.login-wrap{padding:12px}}
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-ring" id="loginLogoRing">🏫</div>
        <div class="login-title" id="loginSchoolName">School Mitra</div>
        <div class="login-sub">Admin Dashboard</div>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" onclick="switchPanel('login')">🔐 Login</button>
        <button class="auth-tab" onclick="switchPanel('forgot')">🔑 Forgot Password</button>
        <button class="auth-tab" id="setupTab" style="display:none" onclick="switchPanel('setup')">⚙️ Setup</button>
      </div>

      <!-- Alert -->
      <div class="alert" id="alertBox"></div>

      <!-- ── LOGIN PANEL ── -->
      <div class="panel active" id="panel-login">
        <form id="loginForm">
          <div class="field">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="admin@school.com" required autocomplete="email"/>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="pw-wrap">
              <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password"/>
              <button type="button" class="pw-toggle" onclick="togglePw('loginPassword',this)">👁️</button>
            </div>
          </div>
          <div class="login-extras">
            <label class="remember">
              <input type="checkbox" id="rememberMe" checked/> Remember me
            </label>
            <a href="#" class="forgot-link" onclick="switchPanel('forgot');return false">Forgot password?</a>
          </div>
          <button type="submit" class="btn-submit" id="loginBtn">🔐 Login to Dashboard</button>
        </form>
      </div>

      <!-- ── FORGOT PASSWORD PANEL ── -->
      <div class="panel" id="panel-forgot">
        <form id="forgotForm">
          <div class="field">
            <label>Registered Email</label>
            <input type="email" id="forgotEmail" placeholder="admin@school.com" required/>
          </div>
          <button type="submit" class="btn-submit" id="forgotBtn">📱 Send Reset Link via WhatsApp</button>
        </form>
        <div id="resetLinkBox" class="reset-link-box"></div>
        <div class="divider"><span>or</span></div>
        <div style="text-align:center">
          <a href="#" class="forgot-link" onclick="switchPanel('login');return false">← Back to Login</a>
        </div>
      </div>

      <!-- ── SETUP PANEL (first time only) ── -->
      <div class="panel" id="panel-setup">
        <div style="background:rgba(247,201,72,0.08);border:1px solid rgba(247,201,72,0.3);border-radius:10px;padding:12px 14px;margin-bottom:20px;font-size:0.82rem;color:#f7c948">
          ⚠️ First-time setup. This option disappears after the first admin is created.
        </div>
        <form id="setupForm">
          <div class="field"><label>Full Name</label><input type="text" id="setupName" placeholder="Dr. A.K. Sharma" required/></div>
          <div class="field"><label>Email</label><input type="email" id="setupEmail" placeholder="admin@school.com" required/></div>
          <div class="field"><label>Phone (for WhatsApp resets)</label><input type="text" id="setupPhone" placeholder="+91 98765 43210"/></div>
          <div class="field">
            <label>Password (min 8 chars)</label>
            <div class="pw-wrap">
              <input type="password" id="setupPassword" placeholder="Create strong password" required minlength="8"/>
              <button type="button" class="pw-toggle" onclick="togglePw('setupPassword',this)">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="setupBtn">⚙️ Create Admin Account</button>
        </form>
        <div class="divider"><span>or</span></div>
        <div style="text-align:center">
          <a href="#" class="forgot-link" onclick="switchPanel('login');return false">← Back to Login</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://school-ai-agent-eynr.onrender.com';

    // ── Load branding on login page too
    async function loadLoginBranding() {
      try {
        const res = await fetch(`${API}/api/branding`);
        const json = await res.json();
        if (json.success && json.data) {
          const b = json.data;
          if (b.school_name) document.getElementById('loginSchoolName').textContent = b.school_name;
          if (b.logo_url) {
            const ring = document.getElementById('loginLogoRing');
            ring.innerHTML = `<img src="${b.logo_url}" style="width:48px;height:48px;object-fit:contain;border-radius:10px"/>`;
          }
          if (b.primary_color) document.documentElement.style.setProperty('--primary', b.primary_color);
          if (b.secondary_color) document.documentElement.style.setProperty('--secondary', b.secondary_color);
        }
      } catch(e) {}
    }

    // ── Check if already logged in
    function checkAlreadyLoggedIn() {
      const token = localStorage.getItem('adminToken') || sessionStorage.getItem('adminToken');
      if (token) window.location.href = 'admin.html';
    }

    // ── Check if setup is needed (no admins yet)
    async function checkSetupNeeded() {
      try {
        const res = await fetch(`${API}/api/auth/setup`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({}) });
        const json = await res.json();
        // If error says "Admin already exists" → hide setup tab
        // If success or different error → maybe show setup
        if (json.error && json.error.includes('already exists')) {
          document.getElementById('setupTab').style.display = 'none';
        }
      } catch(e) {}
    }

    // ── Check first-time (no admins): try a probe
    async function probeFirstTime() {
      try {
        const res = await fetch(`${API}/api/auth/me`, { headers: { 'Authorization': 'Bearer invalid' } });
        // If 401, server is up. Now check if any admin exists by trying login with garbage
        const probe = await fetch(`${API}/api/auth/login`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email: '__probe__@x.com', password: 'x' })
        });
        const pj = await probe.json();
        // If no admin table or empty, setup route returns something different
        if (pj.error && pj.error.toLowerCase().includes('does not exist')) {
          document.getElementById('setupTab').style.display = 'block';
          switchPanel('setup');
        }
      } catch(e) {}
    }

    // ── Show/hide setup tab based on admin count
    async function checkFirstTimeSetup() {
      try {
        // Try a dummy login to see if table exists
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email: 'x', password: 'x' })
        });
        const json = await res.json();
        if (!json.success && json.error && json.error.includes('does not exist')) {
          // Table doesn't exist — show setup
          document.getElementById('setupTab').style.display = 'flex';
        }
      } catch(e) {}
    }

    // ── Panel switcher
    window.switchPanel = function(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      const idx = { login: 0, forgot: 1, setup: 2 };
      const tabs = document.querySelectorAll('.auth-tab');
      if (tabs[idx[name]]) tabs[idx[name]].classList.add('active');
      clearAlert();
    };

    // ── Alert helpers
    function showAlert(msg, type) {
      const el = document.getElementById('alertBox');
      el.className = `alert ${type} show`;
      el.innerHTML = msg;
    }
    function clearAlert() { document.getElementById('alertBox').className = 'alert'; }

    // ── Password toggle
    window.togglePw = function(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
    };

    // ── LOGIN FORM
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = '⏳ Logging in...';
      clearAlert();

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
          })
        });
        const json = await res.json();

        if (json.success) {
          const storage = document.getElementById('rememberMe').checked ? localStorage : sessionStorage;
          storage.setItem('adminToken', json.token);
          storage.setItem('adminUser', JSON.stringify(json.admin));
          btn.textContent = '✅ Success! Redirecting...';
          showAlert(`Welcome back, <b>${json.admin.name}</b>! 🎉`, 'success');
          setTimeout(() => window.location.href = 'admin.html', 1000);
        } else {
          showAlert('❌ ' + json.error, 'error');
          btn.disabled = false; btn.textContent = '🔐 Login to Dashboard';
        }
      } catch (err) {
        showAlert('❌ Server error. Please try again.', 'error');
        btn.disabled = false; btn.textContent = '🔐 Login to Dashboard';
      }
    });

    // ── FORGOT PASSWORD FORM
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('forgotBtn');
      btn.disabled = true; btn.textContent = '⏳ Sending...';
      clearAlert();

      try {
        const res = await fetch(`${API}/api/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('forgotEmail').value })
        });
        const json = await res.json();
        if (json.success) {
          showAlert('📱 Reset link sent to your WhatsApp! Check your messages.', 'success');
          if (json.resetLink) {
            const box = document.getElementById('resetLinkBox');
            box.style.display = 'block';
            box.innerHTML = `<b>Dev mode reset link:</b><br>${json.resetLink}`;
          }
        } else {
          showAlert('❌ ' + json.error, 'error');
        }
      } catch(err) {
        showAlert('❌ Server error. Try again.', 'error');
      }
      btn.disabled = false; btn.textContent = '📱 Send Reset Link via WhatsApp';
    });

    // ── SETUP FORM
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('setupBtn');
      btn.disabled = true; btn.textContent = '⏳ Creating admin...';
      clearAlert();

      try {
        const res = await fetch(`${API}/api/auth/setup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('setupName').value,
            email: document.getElementById('setupEmail').value,
            password: document.getElementById('setupPassword').value,
            phone: document.getElementById('setupPhone').value
          })
        });
        const json = await res.json();
        if (json.success) {
          showAlert('✅ Admin created! You can now login.', 'success');
          document.getElementById('setupTab').style.display = 'none';
          setTimeout(() => switchPanel('login'), 1500);
        } else {
          showAlert('❌ ' + json.error, 'error');
        }
      } catch(err) {
        showAlert('❌ Server error. Try again.', 'error');
      }
      btn.disabled = false; btn.textContent = '⚙️ Create Admin Account';
    });

    // ── Init
    checkAlreadyLoggedIn();
    loadLoginBranding();
    checkFirstTimeSetup();
  </script>
</body>
</html>
